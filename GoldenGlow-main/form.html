<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon_io/apple-touch-icon.png"/>
    <link rel="stylesheet" href="shared.css" />
    <link rel="stylesheet" href="styles.css" />
    <title>Golden Glow - Időpontfoglalás</title>
</head>

<style>

    #foglalas-form {
        background: white;
        padding: 30px;
        max-width: 500px;
        margin: 40px auto;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    #foglalas-form div {
        margin-bottom: 15px;
    }

    #foglalas-form label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
        color: #333;
        font-family: "Cinzel", sans-serif;
    }

    #foglalas-form input[type="text"],
    #foglalas-form input[type="email"],
    #foglalas-form textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        font-family: "Cinzel", sans-serif;
    }
    
    #foglalas-form button[type="submit"] {
        background-color: rgb(255, 217, 0);
        color: black;
        border: none;
        padding: 12px 20px;
        cursor: pointer;
        font-weight: bold;
        border-radius: 4px;
        width: 100%;
        font-family: "Cinzel", sans-serif;
        font-size: 16px;
        text-transform: uppercase;
        transition: background-color 0.2s;
    }

#foglalas-form button[type="submit"]:hover {
        background-color: rgb(255, 235, 70);
    }

    #foglalas-form button[type="reset"] {
        background: none;
        border: 1px solid #ccc;
        color: #666;
        padding: 8px 15px;
        cursor: pointer;
        border-radius: 4px;
        font-family: "Cinzel", sans-serif;
    }
</style>

<body>

    <header> 
        <div id="page-logo">
            <a href="index.html">Golden Glow</a>
        </div>
        <nav>
            <ul>
                <li><a href="szolgaltatasok.html">Szolgáltatásaink</a></li>
                <li><a href="rolunk.html">Rólunk</a></li>
                <li><a href="kapcsolat.html">Kapcsolat</a></li>
            </ul>
        </nav>
    </header>

    <main class="services-section">
        <div class="services-container">

            <form id="foglalas-form">
                <div>
                    <label for="fname">Teljes Név:</label>
                    <input type="text" id="fname" name="fname" placeholder="Add meg a neved" required>
                </div>

                <div>
                    <label for="pnumber">Telefonszám:</label>
                    <input type="text" id="pnumber" name="pnumber" placeholder="Add meg a telefonszámod" required>
                </div>

                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Add meg az email címed" required>
                </div>

                <div>
                    <label for="specialist">Választott szakember:</label>
                    <input type="text" id="specialist" name="specialist" placeholder="Választott szakembered" required readonly>
                </div>

                <div>
                    <label for="service">Választott szolgáltatás:</label>
                    <input type="text" id="service" name="service" placeholder="Választott szolgáltatásod" required readonly>
                </div>

                <div>
                    <label for="comment">Megjegyzés:</label>
                    <textarea id="comment" name="comment" rows="3"></textarea>
                </div>

                <div style="display: flex; gap: 10px; justify-content: space-between; align-items: center; margin-top: 20px;">
                    <button type="reset">Törlés</button>
                    <button type="submit">Foglalás véglegesítése</button>
                </div>
            </form>

        </div>
    </main>
    
</body>
</html>
